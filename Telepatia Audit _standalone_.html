le.display = 'block';\n}\n\n// Scribe consultations (doctor's own list)\nconst scribeConsults = [\n  { id: 's08', patient: 'Paciente: 08:05 AM', type: 'Consulta General', status: 'Completada', date: '17/04 · 08:05', score: 88, label: 'BUENO' },\n  { id: 's758', patient: 'Paciente: 7:58 AM',  type: 'Consulta General', status: 'Completada', date: '17/04 · 07:44', score: 91, label: 'EXCELENTE' },\n  { id: 's736', patient: 'Paciente: 7:36 AM',  type: 'Consulta General', status: 'Completada', date: '17/04 · 07:29', score: 84, label: 'BUENO' },\n  { id: 's1048', patient: 'Paciente: 10:48 AM', type: 'Consulta General', status: 'Completada', date: '16/04 · 10:34', score: 79, label: 'ACEPTABLE' },\n  { id: 's1025', patient: 'Paciente: 10:25 AM', type: 'Consulta General', status: 'Sin sugerencias', date: '16/04 · 10:14', score: 72.5, label: 'DEFICIENTE' },\n  { id: 's1005', patient: 'Paciente: 10:05 AM', type: 'Consulta General', status: 'Completada', date: '16/04 · 09:52', score: 86, label: 'BUENO' },\n];\n\n// Audit categories for scribe view (doctor-facing)\nfunction buildScribeAudit(c) {\n  // Categories with score and findings. Each item: { text, why }\n  return [\n    {\n      title: 'Estudios diagnósticos y resultados paraclínicos',\n      pct: 30,\n      items: [\n        { text: 'No proporciona interpretación clínica de hallazgos anormales', why: 'La reseña paraclínica enumera valores sin contextualizarlos. La GPC exige que el médico explique en la nota qué significa cada hallazgo anormal en términos del cuadro clínico del paciente.' },\n        { text: 'No documenta resultados de estudios diagnósticos con valores', why: 'Los estudios mencionados aparecen sin cifras concretas (ej. “TSH elevada” sin valor). El registro debe incluir el valor numérico, la unidad y los rangos de referencia.' },\n      ],\n    },\n    {\n      title: 'Examen físico',\n      pct: 80,\n      items: [\n        { text: 'No documenta tensión arterial con valores sistólico y diastólico', why: 'Se registró “TA normal” sin valores. Para auditoría se requiere TA en formato sistólica/diastólica con mmHg.' },\n        { text: 'No documenta frecuencia respiratoria con valor numérico', why: 'Falta el valor de FR en respiraciones por minuto. Es un signo vital obligatorio en la consulta general.' },\n        { text: 'No documenta talla del paciente con valor numérico y unidad', why: 'Sin talla no se puede calcular IMC ni dosificar medicamentos peso-dependientes. Registrar en centímetros o metros.' },\n      ],\n    },\n    {\n      title: 'Calidad y completitud del registro médico',\n      pct: 100,\n      items: [],\n    },\n    {\n      title: 'Antecedentes patológicos personales',\n      pct: 25,\n      items: [\n        { text: 'No lista ni niega explícitamente antecedentes quirúrgicos', why: 'La nota no menciona si hay o no antecedentes quirúrgicos. Debe registrar explícitamente “niega antecedentes quirúrgicos” si el paciente así lo refiere.' },\n        { text: 'No documenta enfermedades crónicas activas y relevantes', why: 'Hay mención de hipertensión en la enfermedad actual pero no fue listada en antecedentes. Las crónicas activas deben aparecer en su sección correspondiente con fecha de diagnóstico y manejo actual.' },\n        { text: 'No documenta ni niega explícitamente alergias', why: 'Auditoría exige declaración explícita: “Niega alergias medicamentosas conocidas” o el listado de alergias relevantes con su reacción.' },\n        { text: 'No documenta antecedentes familiares ni los indica como no contributivos', why: 'No aparece sección de antecedentes familiares. Indicar al menos “no contributivos” si el paciente no refiere nada relevante.' },\n        { text: 'No documenta medicamentos actuales con nombres', why: 'Se menciona “tratamiento farmacológico” sin especificar moléculas, dosis ni vías. Registrar nombre, dosis, vía y frecuencia.' },\n      ],\n    },\n    {\n      title: 'Educación al paciente y consentimiento informado',\n      pct: 100,\n La disposición debe registrarse explícitamente.' },\n      ],\n    },\n  ];\n}\n\nfunction scribeBarColor(pct) {\n  if (pct >= 85) return 'var(--green-dot)';\n  if (pct >= 60) return 'var(--green-dot)';\n  if (pct >= 40) return 'var(--orange-dot)';\n  return 'var(--red-dot)';\n}\n\nlet activeScribeId = null;\nlet scribeRating = 0;\n\nfunction renderScribe() {\n  if (!activeScribeId) activeScribeId = 's1025';\n  scribeRating = 0;\n  renderScribeList();\n  renderScribeDetail();\n  renderScribeStars();\n}\n\nfunction renderScribeList() {\n  document.getElementById('scribeList').innerHTML = scribeConsults.map(c => {\n    const isActive = c.id === activeScribeId;\n    const isSin = c.status === 'Sin sugerencias';\n    const statusHtml = isSin\n      ? `<span class=\"sb-card-status sb-card-status--neutral\"><svg width=\"12\" height=\"12\" fill=\"none\" viewBox=\"0 0 24 24\" stroke=\"currentColor\" stroke-width=\"2\"><path stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 11l3 3L22 4M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11\"/><\u002Fsvg>${c.status}<\u002Fspan>`\n      : `<span class=\"sb-card-status\"><span class=\"dot\"><\u002Fspan>${c.status}<\u002Fspan>`;\n    return `\n      <div class=\"sb-card ${isActive ? 'sb-card--active' : ''}\" role=\"button\" tabindex=\"0\" onclick=\"selectScribe('${c.id}')\" onkeydown=\"if(event.key==='Enter'||event.key===' '){selectScribe('${c.id}')}\">\n        <button class=\"sb-card-kebab\" onclick=\"event.stopPropagation(); alert('Acciones para ${c.patient}')\" title=\"Más\" aria-label=\"Acciones\">\n          <svg width=\"14\" height=\"14\" fill=\"currentColor\" viewBox=\"0 0 24 24\"><circle cx=\"5\" cy=\"12\" r=\"1.5\"/><circle cx=\"12\" cy=\"12\" r=\"1.5\"/><circle cx=\"19\" cy=\"12\" r=\"1.5\"/><\u002Fsvg>\n        <\u002Fbutton>\n        <div class=\"sb-card-title\">${c.patient}<\u002Fdiv>\n        <div class=\"sb-card-type\">${c.type}<\u002Fdiv>\n        <div class=\"sb-card-foot\">\n          ${statusHtml}\n          <span class=\"sb-card-date\">${c.date}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    `;\n  }).join('');\n}\n\nfunction selectScribe(id) {\n  activeScribeId = id;\n  scribeRating = 0;\n  renderScribeList();\n  renderScribeDetail();\n  renderScribeStars();\n  document.querySelector('.scribe-content').scrollTop = 0;\n}\n\nfunction buildClinicalHistory(c) {\n  // Per-patient clinical record; sample populated for the active demo patient\n  return {\n    identificacion: [\n      { label: 'Número de Identificación', value: '114072' },\n      { label: 'Residencia', value: '[LOCATION]' },\n    ],\n    motivo: '\"vengo presentando unas molestias en el oído, es decir, zumbidos\"',\n    enfermedadActual: 'Paciente con cuadro de aproximadamente 3–4 meses de evolución consistente en acúfenos, de predominio nocturno y con mayor percepción en ambientes silenciosos, asociado a hiperacusia referida para estímulos cotidianos (televisor, motor, electrodomésticos) y a dificultad para la discriminación del habla en ambientes con ruido de fondo. Refiere prurito ótico intermitente, con predominio ocasional en oído izquierdo. Niega sintomatología ótica de características infecciosas. Antecedente referido de exposición ocupacional previa a ruido de alta intensidad (discotecas y eventos), suspendida hace aproximadamente 10 años. Fue valorado previamente en consulta, donde se le informó el término “tinnitus” como explicación del cuadro; consulta para reevaluación y definición de conducta terapéutica.',\n  };\n}\n\nlet scribeOpenSections = {\n  sugerencias: true,\n  identificacion: true,\n  motivo: true,\n  enfermedad: true,\n  revision: false,\n  antecedentes: false,\n  signos: false,\n  medidas: false,\n};\nfunction toggleScribeSec(key) {\n  scribeOpenSections[key] = !scribeOpenSections[key];\n  // Re-render just to update open state\n  const sec = document.querySelector(`.scribe-sec[data-key=\"${key}\"]`);\n  if (sec) sec.setAttribute('data-open', scribeOpenSections[key] ? 'true' : 'false');\n}\n\nfunction scribeSection(key, label, open, body) {\n  return `\n    <section class=\"scribe-sec\" data-key=\"${key}\" data-open=\"${open ? 'true' : 'false'}\">\n      <button class=\"scribe-sec-trigger\" onclick=\"toggleScribeSec('${key}')\">\n        <svg fill=\"none\" viewBox=\"0 0 24 24\" stroke=\"currentColor\" stroke-width=\"2.5\"><path stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M19 9l-7 7-7-7\"/><\u002Fsvg>\n        ${label}\n      <\u002Fbutton>\n      <div class=\"scribe-sec-body\">${body || '<span class=\"t-tertiary\" style=\"font-size: 13px;\">Sin registros<\u002Fspan>'}<\u002Fdiv>\n    <\u002Fsection>\n  `;\n}\n\nlet scribeTab = 'historia';\nfunction setScribeTab(tab) {\n  scribeTab = tab;\n  renderScribeDetail();\n  document.querySelector('.scribe-content').scrollTop = 0;\n}\n\nfunction renderScribeDetail() {\n  const c = scribeConsults.find(x => x.id === activeScribeId) || scribeConsults[0];\n  document.getElementById('scribePatient').textContent = c.patient;\n  const hist = buildClinicalHistory(c);\n  const cats = buildScribeAudit(c);\n\n  // Score color helpers shared between tab pill and donut\n  const tonePalette = {\n    'EXCELENTE': { ring: 'var(--green-dot)', text: 'var(--green-text)' },\n    'BUENO':     { ring: 'var(--green-dot)', text: 'var(--green-text)' },\n    'ACEPTABLE': { ring: 'var(--orange-dot)', text: 'var(--orange-text)' },\n    'DEFICIENTE':{ ring: 'var(--red-dot)',   text: 'var(--red-text)' },\n  };\n  const pal = tonePalette[c.label] || tonePalette.BUENO;\n  const ringColor = pal.ring;\n  const labelColor = pal.text;\n\n  // Donut geometry for the Auditoría tab\n  const R = 56, C2 = 2 * Math.PI * R;\n  const offset = C2 - (c.score / 100) * C2;\n\n  const idBody = `\n    ${hist.identificacion.map(f => `<div class=\"scribe-field-row\">${f.label}: ${f.value}<\u002Fdiv>`).join('')}\n    <button class=\"scribe-more-link\">\n      <svg fill=\"none\" viewBox=\"0 0 24 24\" stroke=\"currentColor\" stroke-width=\"1.8\"><path stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2\"/><\u002Fsvg>\n      Ver más campos\n    <\u002Fbutton>\n  `;\n\n  const tabs = `\n    <div class=\"scribe-tabs\">\n      <button class=\"scribe-tab ${scribeTab==='historia'?'scribe-tab--active':''}\" onclick=\"setScribeTab('historia')\">Historia clínica<\u002Fbutton>\n      <button class=\"scribe-tab ${scribeTab==='resumen'?'scribe-tab--active':''}\" onclick=\"setScribeTab('resumen')\">Resumen<\u002Fbutton>\n      <button class=\"scribe-tab ${scribeTab==='transcripcion'?'scribe-tab--active':''}\" onclick=\"setScribeTab('transcripcion')\">Transcripción<\u002Fbutton>\n      <button class=\"scribe-tab scribe-tab--audit ${scribeTab==='auditoria'?'scribe-tab--active':''}\" onclick=\"setScribeTab('auditoria')\">\n        Auditoría\n        ${(() => {\n          const TR = 15, TC = 2 * Math.PI * TR, TO = TC - (c.score / 100) * TC;\n          const active = scribeTab === 'auditoria';\n          const trackColor = active ? 'rgba(255,255,255,0.25)' : '#ecf1e9';\n          const ringColorTab = active ? '#ffffff' : pal.ring;\n          const textColor = active ? 'var(--on-brand)' : 'var(--text-primary)';\n          return `<span class=\"scribe-tab-score\">\n            <svg width=\"38\" height=\"38\" viewBox=\"0 0 38 38\" style=\"transform: rotate(-90deg);\">\n              <circle cx=\"19\" cy=\"19\" r=\"${TR}\" fill=\"none\" stroke=\"${trackColor}\" stroke-width=\"4\"/>\n              <circle cx=\"19\" cy=\"19\" r=\"${TR}\" fill=\"none\" stroke=\"${ringColorTab}\" stroke-width=\"4\" stroke-linecap=\"round\" stroke-dasharray=\"${TC.toFixed(2)}\" stroke-dashoffset=\"${TO.toFixed(2)}\"/>\n            <\u002Fsvg>\n            <span class=\"pct\" style=\"color: ${textColor};\">${Math.round(c.score)}<\u002Fspan>\n          <\u002Fspan>`;\n        })()}\n      <\u002Fbutton>\n    <\u002Fdiv>\n  `;\n\n  // --- Historia clínica content ---\n  const historiaBody = `\n    <p class=\"scribe-ai-disclaimer\">Este contenido fue generado con IA y puede tener algunos errores. Verifica la información.<\u002Fp>\n    ${scribeSection('sugerencias',   'Sugerencias clínicas',     scribeOpenSections.sugerencias,   '')}\n    ${scribeSection('identificacion','Identificación',           scribeOpenSections.identificacion, idBody)}\n    ${scribeSection('motivo',        'Motivo de Consulta',        scribeOpenSections.motivo,        `<p class=\"scribe-quote\" style=\"margin: 0;\">${hist.motivo}<\u002Fp>`)}\n    ${scribeSection('enfermedad',    'Enfermedad actual',         scribeOpenSections.enfermedad,    `<p style=\"margin: 0;\">${hist.enfermedadActual}<\u002Fp>`)}\n    ${scribeSection('revision',      'Revisión por Sistemas',     scribeOpenSections.revision,      '')}\n    ${scribeSection('antecedentes',  'Antecedentes',              scribeOpenSections.antecedentes,  '')}\n    ${scribeSection('signos',        'Signos Vitales',            scribeOpenSections.signos,        '')}\n    ${scribeSection('medidas',       'Medidas Antropométricas',   scribeOpenSections.medidas,       '')}\n  `;\n\n  // --- Resumen content ---\n  const resumenBody = `\n    <p class=\"scribe-ai-disclaimer\">Resumen generado por IA del encuentro clínico.<\u002Fp>\n    <div class=\"scribe-summary-card\">\n      <h4>Diagnóstico principal<\u002Fh4>\n      <p>Acufenos crónicos bilaterales con hiperacusia y dificultad para discriminación del habla en ambientes ruidosos. Antecedente referido de exposición ocupacional a ruido de alta intensidad.<\u002Fp>\n      <h4>Conducta<\u002Fh4>\n      <p>Reevaluación clínica con definición de plan terapéutico. Considerar interconsulta con otorrinolaringología y audiología funcional. Educación al paciente sobre evolución del tinnitus.<\u002Fp>\n      <h4>Seguimiento<\u002Fh4>\n      <p>Control en 4–6 semanas con resultados de paraclínicos. Signos de alarma documentados.<\u002Fp>\n    <\u002Fdiv>\n  `;\n\n  // --- Transcripción content ---\n  const transcripcionBody = `\n    <p class=\"scribe-ai-disclaimer\">Transcripción automática del audio de la consulta.<\u002Fp>\n    <div class=\"scribe-transcript\">\n      <div class=\"tx-turn\"><span class=\"tx-who\">Médico<\u002Fspan><span class=\"tx-time\">00:00:04<\u002Fspan><p>Buenos días. Cuénteme, ¿qué lo trae hoy a consulta?<\u002Fp><\u002Fdiv>\n      <div class=\"tx-turn\"><span class=\"tx-who\">Paciente<\u002Fspan><span class=\"tx-time\">00:00:09<\u002Fspan><p>Vengo presentando unas molestias en el oído, es decir, zumbidos.<\u002Fp><\u002Fdiv>\n      <div class=\"tx-turn\"><span class=\"tx-who\">Médico<\u002Fspan><span class=\"tx-time\">00:00:18<\u002Fspan><p>¿Desde hace cuánto tiempo? ¿Es en un solo oído o en ambos?<\u002Fp><\u002Fdiv>\n      <div class=\"tx-turn\"><span class=\"tx-who\">Paciente<\u002Fspan><span class=\"tx-time\">00:00:24<\u002Fspan><p>Llevo unos tres o cuatro meses. Lo siento más en silencio, sobre todo en la noche.<\u002Fp><\u002Fdiv>\n      <div class=\"tx-turn\"><span class=\"tx-who\">Médico<\u002Fspan><span class=\"tx-time\">00:00:41<\u002Fspan><p>¿Ha tenido exposición a ruidos fuertes en el trabajo o en otros contextos?<\u002Fp><\u002Fdiv>\n      <div class=\"tx-turn\"><span class=\"tx-who\">Paciente<\u002Fspan><span class=\"tx-time\">00:00:49<\u002Fspan><p>Sí, hace muchos años trabajé en discotecas, pero ya hace como diez años que no.<\u002Fp><\u002Fdiv>\n      <div class=\"tx-turn t-tertiary\"><span class=\"tx-who\">…<\u002Fspan><span class=\"tx-time\">…<\u002Fspan><p>Transcripción continúa<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  `;\n\n  // --- Auditoría content ---\n  const auditoriaBody = `\n    <div class=\"score-donut\">\n      <svg width=\"170\" height=\"170\" viewBox=\"0 0 140 140\" style=\"transform: rotate(-90deg);\">\n        <circle cx=\"70\" cy=\"70\" r=\"${R}\" stroke=\"#ecf1e9\" stroke-width=\"14\" fill=\"none\"/>\n        <circle cx=\"70\" cy=\"70\" r=\"${R}\" stroke=\"${ringColor}\" stroke-width=\"14\" fill=\"none\" stroke-linecap=\"round\" stroke-dasharray=\"${C2}\" stroke-dashoffset=\"${offset}\"/>\n      <\u002Fsvg>\n      <div class=\"score-donut-center\">\n        <div class=\"score-donut-pct\">${c.score}%<\u002Fdiv>\n        <div class=\"score-donut-label\" style=\"color: ${labelColor};\">${c.label}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    ${cats.map((cat, ci) => `\n      <div class=\"audit-cat-section\">\n        <div class=\"audit-cat-title\">${cat.title}<\u002Fdiv>\n        <div class=\"audit-cat-bar\"><div style=\"width: ${cat.pct}%; background: ${scribeBarColor(cat.pct)};\"><\u002Fdiv><\u002Fdiv>\n        ${cat.items.length ? `<ul class=\"audit-cat-list\">${cat.items.map((it, ii) => `\n          <li class=\"audit-cat-item\" data-key=\"c${ci}-i${ii}\" data-open=\"false\">\n            <button class=\"audit-cat-item-trigger\" onclick=\"toggleCriterio('c${ci}-i${ii}')\" aria-expanded=\"false\">\n              <span class=\"audit-cat-item-text\">${it.text}<\u002Fspan>\n              <svg class=\"audit-cat-item-chev\" fill=\"none\" viewBox=\"0 0 24 24\" stroke=\"currentColor\" stroke-width=\"2.2\"><path stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5l7 7-7 7\"/><\u002Fsvg>\n            <\u002Fbutton>\n            <div class=\"audit-cat-item-why\">\n              <div class=\"audit-cat-item-why-head\">¿Por qué falló este criterio?<\u002Fdiv>\n              <p>${it.why}<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fli>\n        `).join('')}<\u002Ful>` : ''}\n      <\u002Fdiv>\n    `).join('')}\n  `;\n\n  const body = scribeTab === 'historia' ? historiaBody\n             : scribeTab === 'resumen' ? resumenBody\n             : scribeTab === 'transcripcion' ? transcripcionBody\n             : auditoriaBody;\n\n  document.getElementById('scribeContent').innerHTML = `\n    ${tabs}\n    ${body}\n    <div class=\"scribe-build-wrap\">\n      <div class=\"scribe-build-chip\">fc2c57b284eef96df48b0eaf79feaa9aa52d5f70<\u002Fdiv>\n    <\u002Fdiv>\n  `;\n}\n\nfunction renderScribeStars() {\n  document.getElementById('scribeStars').innerHTML = [1,2,3,4,5].map(i => `\n    <button data-i=\"${i}\" onclick=\"setScribeRating(${i})\" class=\"${i <= scribeRating ? 'lit' : ''}\">\n      <svg viewBox=\"0 0 24 24\" fill=\"${i <= scribeRating ? 'currentColor' : 'none'}\" stroke=\"currentColor\" stroke-width=\"1.8\">\n        <path stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14l-5-4.87 6.91-1.01L12 2z\"/>\n      <\u002Fsvg>\n    <\u002Fbutton>\n  `).join('');\n}\nfunction setScribeRating(n) {\n  scribeRating = n;\n  renderScribeStars();\n  setTimeout(() => alert(`Gracias por tu calificación de ${n} estrella${n!==1?'s':''}.`), 80);\n}\n\nfunction toggleCriterio(key) {\n  const li = document.querySelector(`.audit-cat-item[data-key=\"${key}\"]`);\n  if (!li) return;\n  const open = li.getAttribute('data-open') === 'true';\n  li.setAttribute('data-open', open ? 'false' : 'true');\n  li.querySelector('.audit-cat-item-trigger').setAttribute('aria-expanded', open ? 'false' : 'true');\n}\n\n// ============================================================\n// AUDITOR DASHBOARD\n// ============================================================\nfunction renderAuditor() {\n  document.getElementById('sortScore').classList.add('hx-tag--selected');\n  document.getElementById('sortOrders').classList.remove('hx-tag--selected');\n  renderDoctorTable();\n  renderScoreTiers();\n  renderBudgetAlerts();\n  renderTamizajeList();\n  renderExamsList();\n  renderPertinenceList();\n  renderReferralsList();\n  renderReferralDoctorList();\n  renderAuditorTrend();\n}\n\nlet doctorSort = 'score';\nfunction sortDoctors(key) {\n  doctorSort = key;\n  document.getElementById('sortScore').classList.toggle('hx-tag--selected', key === 'score');\n  document.getElementById('sortOrders').classList.toggle('hx-tag--selected', key === 'orders');\n  renderDoctorTable();\n}\nfunction renderDoctorTable() {\n  const list = [...doctors].sort((a, b) => doctorSort === 'score' ? b.score - a.score : b.orders - a.orders);\n  document.getElementById('doctorTable').innerHTML = list.map((d, i) => `\n    <tr style=\"cursor: pointer;\" onclick=\"alert('Perfil del Dr. ${d.name}')\">\n      <td class=\"num\" style=\"font-weight: 600; color: var(--text-tertiary);\">${String(i+1).padStart(2,'0')}<\u002Ftd>\n      <td>\n        <div class=\"t-body-s-med\">${d.name}<\u002Fdiv>\n        <div class=\"t-caption\">${d.specialty}<\u002Fdiv>\n      <\u002Ftd>\n      <td style=\"text-align: center;\" class=\"num\"><b style=\"color: var(--text-primary);\">${d.score.toFixed(1)}<\u002Fb><\u002Ftd>\n      <td style=\"text-align: center;\" class=\"num\">${d.orders}<\u002Ftd>\n      <td style=\"text-align: center;\" class=\"num\">${d.exams}<\u002Ftd>\n      <td style=\"text-align: center;\">${badge(d.status, d.tone)}<\u002Ftd>\n    <\u002Ftr>\n  `).join('');\n}\nfunction renderScoreTiers() {\n  document.getElementById('scoreTiers').innerHTML = scoreTiers.map(t => `\n    <div style=\"display: flex; align-items: center; gap: 12px;\">\n      <div style=\"width: 4px; align-self: stretch; min-height: 36px; background: var(--${t.tone}-dot); border-radius: 2px;\"><\u002Fdiv>\n      <div style=\"flex: 1;\">\n        <div style=\"display: flex; align-items: baseline; gap: 8px;\">\n          <div class=\"t-body-s-med num\">${t.range}<\u002Fdiv>\n          <div class=\"t-caption\" style=\"color: var(--${t.tone}-text); font-weight: 600;\">${t.label}<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"t-caption\">${t.desc}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  `).join('');\n}\nfunction renderBudgetAlerts() {\n  document.getElementById('budgetAlerts').innerHTML = budgets.map(b => {\n    const tone = levelToTone(b.level);\n    const over = b.used > 100;\n    return `\n      <div style=\"border: 1px solid var(--stroke-primary); border-radius: 12px; padding: 14px;\">\n        <div class=\"flex items-center justify-between mb-2\">\n          <div>\n            <div class=\"t-body-s-med\">${b.specialty}<\u002Fdiv>\n            <div class=\"t-caption\">Límite ${b.limit}<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"flex items-center gap-2\">\n            <span class=\"t-h4 num\" style=\"color: var(--${tone}-text);\">${b.used}%<\u002Fspan>\n            ${badge(b.level, tone)}\n          <\u002Fdiv>\n        <\u002Fdiv>\n        ${meter(b.used, tone)}\n        ${over ? `<div class=\"t-caption\" style=\"margin-top: 8px; color: var(--red-text); font-weight: 600;\">Límite excedido · intervención inmediata<\u002Fdiv>` : ''}\n      <\u002Fdiv>\n    `;\n  }).join('');\n}\nfunction renderTamizajeList() {\n  document.getElementById('tamizajeList').innerHTML = tamizajes.map(t => {\n    const onTarget = t.current >= t.goal;\n    const tone = onTarget ? 'green' : t.current >= t.goal * 0.9 ? 'yellow' : 'red';\n    return `\n      <div style=\"border: 1px solid var(--stroke-primary); border-radius: 12px; padding: 12px;\">\n        <div class=\"flex items-center justify-between mb-2\" style=\"align-items: flex-start;\">\n          <div style=\"flex: 1; min-width: 0;\">\n            <div class=\"t-body-s-med\">${t.name}<\u002Fdiv>\n            <div class=\"t-caption\">${t.pop} · meta ${t.goal}%<\u002Fdiv>\n            <div class=\"t-caption\" style=\"color: var(--brand); font-weight: 600; margin-top: 2px;\">${t.norm}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"text-align: right; margin-left: 12px;\">\n            <div class=\"t-h4 num\" style=\"color: var(--${tone}-text); margin: 0;\">${t.current}%<\u002Fdiv>\n            ${badge(onTarget ? 'En meta' : 'Bajo meta', tone)}\n          <\u002Fdiv>\n        <\u002Fdiv>\n        ${meter(t.current, tone)}\n      <\u002Fdiv>\n    `;\n  }).join('');\n}\nfunction renderExamsList() {\n  const max = Math.max(...topExams.map(e => e.count));\n  document.getElementById('examsList').innerHTML = topExams.map(e => {\n    const pctP = Math.round((e.pertinent / e.count) * 100);\n    const pctN = 100 - pctP;\n    const barTotal = (e.count / max) * 100;\n    const pBar = barTotal * (e.pertinent / e.count);\n    const nBar = barTotal * (e.nonPertinent / e.count);\n    const flag = pctN >= 20;\n    return `\n      <div>\n        <div class=\"flex items-center justify-between\" style=\"margin-bottom: 4px;\">\n          <div class=\"t-body-s flex items-center gap-2\">${flag ? '<span class=\"hx-badge-dot\" style=\"background: var(--red-dot); width: 8px; height: 8px;\"><\u002Fspan>' : ''}${e.name}<\u002Fdiv>\n          <div class=\"t-caption num\"><b style=\"color: var(--text-primary);\">${e.count}<\u002Fb> · <span style=\"color: var(--green-text);\">${pctP}%<\u002Fspan> · <span style=\"color: var(--red-text);\">${pctN}%<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"hx-meter hx-meter-stacked\" style=\"height: 6px;\">\n          <div style=\"width: ${pBar}%; background: var(--green-dot);\"><\u002Fdiv>\n          <div style=\"width: ${nBar}%; background: var(--red-dot);\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    `;\n  }).join('');\n}\nfunction renderPertinenceList() {\n  const flagged = doctorPertinence.filter(d => d.pct < 90).sort((a, b) => a.pct - b.pct);\n  const ok = doctorPertinence.filter(d => d.pct >= 90);\n  document.getElementById('pertinenceList').innerHTML = `\n    ${flagged.map(d => {\n      const tone = d.pct < 70 ? 'red' : d.pct < 80 ? 'orange' : 'yellow';\n      const nonP = d.total - d.pertinent;\n      return `\n        <div style=\"border: 1px solid var(--${tone}-dot); background: var(--${tone}-bg); border-radius: 12px; padding: 12px;\">\n          <div class=\"flex items-center justify-between\" style=\"margin-bottom: 8px;\">\n            <div style=\"flex: 1;\">\n              <div class=\"t-body-s-med\">Dr. ${d.name}<\u002Fdiv>\n              <div class=\"t-caption\">${d.total} órdenes · <span style=\"color: var(--green-text); font-weight: 600;\">${d.pertinent} pertinentes<\u002Fspan> · <span style=\"color: var(--red-text); font-weight: 600;\">${nonP} impertinentes<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"text-align: right;\">\n              <div class=\"t-h2 num\" style=\"color: var(--${tone}-text); margin: 0;\">${d.pct}%<\u002Fdiv>\n              <div class=\"t-caption\" style=\"color: var(--${tone}-text); font-weight: 600;\">PERTINENCIA<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"hx-meter hx-meter-stacked\" style=\"background: white;\">\n            <div style=\"width: ${d.pct}%; background: var(--green-dot);\"><\u002Fdiv>\n            <div style=\"width: ${100 - d.pct}%; background: var(--red-dot);\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"flex items-center gap-2 mt-3\">\n            <button class=\"hx-btn hx-btn-inverse\" style=\"height: 32px; font-size: 12px; flex: 1;\" onclick=\"alert('Recap semanal enviado al Dr. ${d.name}.')\">Enviar recap<\u002Fbutton>\n            <button class=\"hx-btn hx-btn-ghost\" style=\"height: 32px; font-size: 12px;\" onclick=\"alert('Perfil del Dr. ${d.name}')\">Ver detalle<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      `;\n    }).join('')}\n    <div class=\"t-caption\" style=\"background: var(--bg-primary); border: 1px solid var(--stroke-primary); border-radius: 10px; padding: 10px 12px;\">\n      ✓ ${ok.length} doctores con pertinencia ≥ 90% (sin alerta): ${ok.map(d => d.name).join(', ')}\n    <\u002Fdiv>\n  `;\n}\nfunction renderReferralsList() {\n  const max = Math.max(...topReferrals.map(e => e.count));\n  document.getElementById('referralsList').innerHTML = topReferrals.map(e => {\n    const pctP = Math.round((e.pertinent / e.count) * 100);\n    const pctN = 100 - pctP;\n    const barTotal = (e.count / max) * 100;\n    const pBar = barTotal * (e.pertinent / e.count);\n    const nBar = barTotal * (e.nonPertinent / e.count);\n    const flag = pctN >= 20;\n    return `\n      <div>\n        <div class=\"flex items-center justify-between\" style=\"margin-bottom: 4px;\">\n          <div class=\"t-body-s flex items-center gap-2\">${flag ? '<span class=\"hx-badge-dot\" style=\"background: var(--red-dot); width: 8px; height: 8px;\"><\u002Fspan>' : ''}${e.name}<\u002Fdiv>\n          <div class=\"t-caption num\"><b style=\"color: var(--text-primary);\">${e.count}<\u002Fb> · <span style=\"color: var(--green-text);\">${pctP}%<\u002Fspan> · <span style=\"color: var(--red-text);\">${pctN}%<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"hx-meter hx-meter-stacked\" style=\"height: 6px;\">\n          <div style=\"width: ${pBar}%; background: var(--green-dot);\"><\u002Fdiv>\n          <div style=\"width: ${nBar}%; background: var(--red-dot);\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    `;\n  }).join('');\n}\nfunction renderReferralDoctorList() {\n  const flagged = doctorReferralPertinence.filter(d => d.pct < 90).sort((a, b) => a.pct - b.pct);\n  const ok = doctorReferralPertinence.filter(d => d.pct >= 90);\n  document.getElementById('referralDoctorList').innerHTML = `\n    ${flagged.map(d => {\n      const tone = d.pct < 70 ? 'red' : d.pct < 80 ? 'orange' : 'yellow';\n      const nonP = d.total - d.pertinent;\n      return `\n        <div style=\"border: 1px solid var(--${tone}-dot); background: var(--${tone}-bg); border-radius: 12px; padding: 12px;\">\n          <div class=\"flex items-center justify-between\" style=\"margin-bottom: 8px;\">\n            <div style=\"flex: 1;\">\n              <div class=\"t-body-s-med\">Dr. ${d.name}<\u002Fdiv>\n              <div class=\"t-caption\">${d.total} remisiones · <span style=\"color: var(--green-text); font-weight: 600;\">${d.pertinent} pertinentes<\u002Fspan> · <span style=\"color: var(--red-text); font-weight: 600;\">${nonP} impertinentes<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"text-align: right;\">\n              <div class=\"t-h2 num\" style=\"color: var(--${tone}-text); margin: 0;\">${d.pct}%<\u002Fdiv>\n              <div class=\"t-caption\" style=\"color: var(--${tone}-text); font-weight: 600;\">PERTINENCIA<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"hx-meter hx-meter-stacked\" style=\"background: white;\">\n            <div style=\"width: ${d.pct}%; background: var(--green-dot);\"><\u002Fdiv>\n            <div style=\"width: ${100 - d.pct}%; background: var(--red-dot);\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"flex items-center gap-2 mt-3\">\n            <button class=\"hx-btn hx-btn-inverse\" style=\"height: 32px; font-size: 12px; flex: 1;\" onclick=\"alert('Recap de remisiones enviado al Dr. ${d.name}.')\">Enviar recap<\u002Fbutton>\n            <button class=\"hx-btn hx-btn-ghost\" style=\"height: 32px; font-size: 12px;\" onclick=\"alert('Perfil del Dr. ${d.name}')\">Ver detalle<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      `;\n    }).join('')}\n    <div class=\"t-caption\" style=\"background: var(--bg-primary); border: 1px solid var(--stroke-primary); border-radius: 10px; padding: 10px 12px;\">\n      ✓ ${ok.length} doctores con pertinencia ≥ 90% (sin alerta): ${ok.map(d => d.name).join(', ')}\n    <\u002Fdiv>\n  `;\n}\n\nlet auditorChart = null;\nfunction renderAuditorTrend() {\n  const canvas = document.getElementById('auditorTrendChart');\n  if (!canvas) return;\n  if (auditorChart) auditorChart.destroy();\n  const labels = [], data = [];\n  for (let i = 30; i >= 0; i--) {\n    const d = new Date(); d.setDate(d.getDate() - i);\n    labels.push(d.getDate() + '/' + (d.getMonth() + 1));\n    // Deterministic pseudo-random for stable look\n    data.push(Math.round(82 + Math.sin(i * 0.7) * 6 + Math.cos(i * 0.3) * 3 + 4));\n  }\n  auditorChart = new Chart(canvas, {\n    type: 'line',\n    data: { labels, datasets: [{\n      label: 'Puntaje',\n      data,\n      borderColor: getComputedStyle(document.documentElement).getPropertyValue('--brand').trim(),\n      backgroundColor: 'rgba(5, 90, 53, 0.08)',\n      tension: 0.35, fill: true,\n      pointRadius: 2, pointBackgroundColor: getComputedStyle(document.documentElement).getPropertyValue('--brand').trim(),\n      borderWidth: 2,\n    }]},\n    options: {\n      responsive: true,\n      plugins: { legend: { display: false } },\n      scales: {\n        y: { min: 60, max: 100, grid: { color: '#ecf1e9' }, ticks: { color: '#576a55', font: { family: 'IBM Plex Sans' } } },\n        x: { grid: { display: false }, ticks: { color: '#576a55', font: { family: 'IBM Plex Sans' }, maxRotation: 0 } },\n      }\n    }\n  });\n}\n\n// ============================================================\n// CEO DASHBOARD\n// ============================================================\nfunction renderCEO() { ceoTab('general'); }\nlet ceoChart = null, doctorImpactChart = null;\nfunction ceoTab(name) {\n  document.querySelectorAll('.ceo-panel').forEach(p => p.classList.add('hidden'));\n  document.getElementById('ceo-' + name).classList.remove('hidden');\n  document.querySelectorAll('.t-tab').forEach(t => t.classList.remove('t-tab--active'));\n  document.getElementById('tab-' + name).classList.add('t-tab--active');\n\n  if (name === 'general') { renderTopDoctors(); renderCEOTrend(); renderHeatmap(); }\n  if (name === 'doctor') { renderCEODoctorTable(); renderDoctorImpact(); renderCEOExams(); }\n  if (name === 'budget') renderCEOBudget();\n  if (name === 'tamizaje') renderCEOTamizaje();\n  if (name === 'criteria') renderCriteria();\n}\nfunction renderTopDoctors() {\n  // Horizontal bar chart with 0–100 axis (mirrors real backoffice)\n  const scale = `\n    <div class=\"hbar-axis\">\n      <div><\u002Fdiv>\n      <div class=\"hbar-axis-scale\">\n        <span>0<\u002Fspan><span>20<\u002Fspan><span>40<\u002Fspan><span>60<\u002Fspan><span>80<\u002Fspan><span>100<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>`;\n  const renderRow = (d, color) => `\n    <div class=\"hbar-row\">\n      <div class=\"hbar-name\" title=\"${d.name}\">${d.name}<\u002Fdiv>\n      <div class=\"hbar-track\">\n        <div class=\"hbar-fill\" style=\"width: ${Math.max(d.score, 0.5)}%; background: ${color};\"><\u002Fdiv>\n        <span class=\"hbar-value\" style=\"left: calc(${Math.max(d.score, 0.5)}% + 8px);\">${d.score.toFixed(1)}<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>`;\n  document.getElementById('topLowDoctors').innerHTML  = scale + doctorsExtended.low.map(d => renderRow(d, 'var(--red-dot)')).join('');\n  document.getElementById('topHighDoctors').innerHTML = scale + doctorsExtended.high.map(d => renderRow(d, 'var(--green-dot)')).join('');\n}\nfunction renderCEOTrend() {\n  const canvas = document.getElementById('ceoTrendChart');\n  if (!canvas) return;\n  if (ceoChart) ceoChart.destroy();\n  const labels = [], data = [];\n  for (let i = 30; i >= 0; i--) {\n    const d = new Date(); d.setDate(d.getDate() - i);\n    labels.push(d.getDate() + '/' + (d.getMonth() + 1));\n    data.push(Math.round(85 + Math.sin(i * 0.5) * 5 + Math.cos(i * 0.8) * 4));\n  }\n  const brand = getComputedStyle(document.documentElement).getPropertyValue('--brand').trim();\n  ceoChart = new Chart(canvas, {\n    type: 'line',\n    data: { labels, datasets: [{ label: 'Puntaje', data, borderColor: brand, backgroundColor: 'rgba(5,90,53,0.08)', tension: 0.35, fill: true, pointRadius: 2, borderWidth: 2 }]},\n    options: {\n      responsive: true,\n      plugins: { legend: { display: false } },\n      scales: {\n        y: { min: 60, max: 100, grid: { color: '#ecf1e9' }, ticks: { color: '#576a55' } },\n        x: { grid: { display: false }, ticks: { color: '#576a55', maxRotation: 0 } },\n      }\n    }\n  });\n}\nfunction renderHeatmap() {\n  const sections = ['Historia clínica', 'Examen físico', 'Diagnóstico', 'Plan de manejo', 'Órdenes', 'Seguimiento'];\n  const weeks = ['Semana 1', 'Semana 2', 'Semana 3', 'Semana 4'];\n  // Deterministic values\n  const values = [\n    [88, 92, 90, 94],\n    [76, 82, 85, 81],\n    [91, 90, 93, 92],\n    [72, 76, 79, 81],\n    [83, 86, 84, 88],\n    [68, 73, 71, 76],\n  ];\n  let html = '<div style=\"display: grid; grid-template-columns: 160px repeat(4, 1fr); gap: 6px;\">';\n  html += '<div><\u002Fdiv>' + weeks.map(w => `<div class=\"t-caption\" style=\"text-align: center; font-weight: 600;\">${w}<\u002Fdiv>`).join('');\n  sections.forEach((s, si) => {\n    html += `<div class=\"t-body-s-med\" style=\"display: flex; align-items: center;\">${s}<\u002Fdiv>`;\n    weeks.forEach((_, wi) => {\n      const v = values[si][wi];\n      let bg = 'var(--green-dot)';\n      if (v < 70) bg = 'var(--red-dot)';\n      else if (v < 80) bg = 'var(--yellow-dot)';\n      else if (v < 90) bg = '#4ec38d';\n      html += `<div class=\"num\" style=\"background: ${bg}; color: white; font-weight: 600; font-size: 13px; border-radius: 8px; display: grid; place-items: center; height: 44px;\">${v}%<\u002Fdiv>`;\n    });\n  });\n  html += '<\u002Fdiv>';\n  document.getElementById('heatmap').innerHTML = html;\n}\nfunction renderCEODoctorTable() {\n  document.getElementById('ceoDoctorTable').innerHTML = doctors.map((d, i) => `\n    <tr>\n      <td class=\"num\" style=\"font-weight: 600; color: var(--text-tertiary);\">${String(i+1).padStart(2,'0')}<\u002Ftd>\n      <td class=\"t-body-s-med\">${d.name}<\u002Ftd>\n      <td class=\"t-secondary\">${d.specialty}<\u002Ftd>\n      <td style=\"text-align: center;\" class=\"num\"><b>${d.score.toFixed(1)}<\u002Fb><\u002Ftd>\n      <td style=\"text-align: center;\" class=\"num\">${d.orders}<\u002Ftd>\n      <td style=\"text-align: right;\" class=\"num t-mono\"><b>COP ${(d.cost / 1000000).toFixed(1)}M<\u002Fb><\u002Ftd>\n      <td style=\"text-align: center;\" class=\"num\">${d.approval}%<\u002Ftd>\n      <td style=\"text-align: center;\">${badge(d.status, d.tone)}<\u002Ftd>\n    <\u002Ftr>\n  `).join('');\n}\nfunction renderDoctorImpact() {\n  const canvas = document.getElementById('doctorImpactChart');\n  if (!canvas) return;\n  if (doctorImpactChart) doctorImpactChart.destroy();\n  const top5 = [...doctors].sort((a, b) => b.cost - a.cost).slice(0, 5);\n  doctorImpactChart = new Chart(canvas, {\n    type: 'bar',\n    data: { labels: top5.map(d => d.name), datasets: [{\n      label: 'Costo (millones COP)',\n      data: top5.map(d => d.cost / 1000000),\n      backgroundColor: top5.map(d => {\n        if (d.tone === 'red') return '#d32f2f';\n        if (d.tone === 'orange') return '#d97706';\n        if (d.tone === 'yellow') return '#c49200';\n        return '#068450';\n      }),\n      borderRadius: 6,\n    }]},\n    options: {\n      indexAxis: 'y',\n      responsive: true,\n      plugins: { legend: { display: false } },\n      scales: {\n        y: { grid: { display: false }, ticks: { color: '#576a55' } },\n        x: { grid: { color: '#ecf1e9' }, ticks: { color: '#576a55' } },\n      }\n    }\n  });\n}\nfunction renderCEOExams() {\n  const max = Math.max(...topExams.map(e => e.count));\n  document.getElementById('ceoExamsList').innerHTML = topExams.map(e => {\n    const pctP = Math.round((e.pertinent / e.count) * 100);\n    return `\n      <div>\n        <div class=\"flex items-center justify-between\" style=\"margin-bottom: 4px;\">\n          <div class=\"t-body-s\">${e.name}<\u002Fdiv>\n          <div class=\"t-caption num\"><b style=\"color: var(--text-primary);\">${e.count}<\u002Fb> · ${pctP}% pertinentes<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"hx-meter\" style=\"height: 5px;\"><div style=\"width: ${(e.count / max) * 100}%; background: var(--brand);\"><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    `;\n  }).join('');\n}\nfunction renderCEOBudget() {\n  const items = doctors.map(d => {\n    const pct = Math.min(120, Math.round((d.cost / 50000000) * 100));\n    const level = pct > 100 ? 'RED' : pct >= 90 ? 'ORANGE' : pct >= 75 ? 'YELLOW' : 'GREEN';\n    return { ...d, pct, level };\n  });\n  document.getElementById('ceoBudgetList').innerHTML = items.map(d => {\n    const tone = levelToTone(d.level);\n    return `\n      <div style=\"display: flex; align-items: center; gap: 20px; padding: 14px 0; border-bottom: 1px solid var(--stroke-primary);\">\n        <div style=\"flex: 1;\">\n          <div class=\"t-body-s-med\">${d.name} <span class=\"t-caption\" style=\"font-weight: 400;\">· ${d.specialty}<\u002Fspan><\u002Fdiv>\n          <div class=\"t-caption num\">COP ${(d.cost/1000000).toFixed(1)}M / COP 50.0M límite<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"width: 240px;\">${meter(d.pct, tone)}<\u002Fdiv>\n        <div style=\"width: 80px; text-align: right;\">\n          <div class=\"t-h4 num\" style=\"color: var(--${tone}-text); margin: 0;\">${d.pct}%<\u002Fdiv>\n          ${badge(d.level, tone)}\n        <\u002Fdiv>\n        <button class=\"hx-btn hx-btn-secondary\" style=\"height: 36px; font-size: 13px;\" onclick=\"alert('Alerta enviada a ${d.name} y supervisor.')\">Notificar<\u002Fbutton>\n      <\u002Fdiv>\n    `;\n  }).join('');\n}\nfunction renderCEOTamizaje() {\n  document.getElementById('ceoTamizajeGrid').innerHTML = tamizajes.map(t => {\n    const onTarget = t.current >= t.goal;\n    const tone = onTarget ? 'green' : t.current >= t.goal * 0.9 ? 'yellow' : 'red';\n    return `\n      <div class=\"hx-card\" style=\"display: flex; flex-direction: column; min-height: 240px;\">\n        <div class=\"t-eyebrow\" style=\"color: var(--brand); margin-bottom: 8px;\">${t.norm}<\u002Fdiv>\n        <div class=\"t-body-s-med\" style=\"line-height: 18px;\">${t.name}<\u002Fdiv>\n        <div class=\"t-caption\">${t.pop}<\u002Fdiv>\n        <div class=\"subtle-divider\" style=\"margin: 12px 0;\"><\u002Fdiv>\n        <div class=\"flex items-center justify-between mb-1\">\n          <div class=\"t-caption\">Meta<\u002Fdiv>\n          <div class=\"t-body-s-med num\">${t.goal}%<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"flex items-center justify-between mb-2\">\n          <div class=\"t-caption\">Actual<\u002Fdiv>\n          <div class=\"t-h3 num\" style=\"color: var(--${tone}-text); margin: 0;\">${t.current}%<\u002Fdiv>\n        <\u002Fdiv>\n        ${meter(t.current, tone)}\n        <div style=\"margin-top: 12px;\">${badge(onTarget ? 'En meta' : 'Bajo meta', tone)}<\u002Fdiv>\n      <\u002Fdiv>\n    `;\n  }).join('');\n}\nfunction renderCriteria() {\n  document.getElementById('criteriaList').innerHTML = `\n    <table class=\"hx-table\">\n      <thead>\n        <tr>\n          <th style=\"width: 100px;\">Código<\u002Fth>\n          <th>Criterio<\u002Fth>\n          <th style=\"text-align: center; width: 100px;\">Peso<\u002Fth>\n          <th style=\"text-align: center; width: 120px;\">Promedio<\u002Fth>\n          <th style=\"width: 320px;\">Rendimiento<\u002Fth>\n        <\u002Ftr>\n      <\u002Fthead>\n      <tbody>\n        ${criteriaMap.map(c => {\n          const tone = c.avg >= 85 ? 'green' : c.avg >= 75 ? 'yellow' : 'red';\n          return `\n            <tr>\n              <td class=\"t-mono\" style=\"font-weight: 600; color: var(--brand);\">${c.code}<\u002Ftd>\n              <td class=\"t-body-s-med\">${c.name}<\u002Ftd>\n              <td class=\"num\" style=\"text-align: center;\">${c.weight}%<\u002Ftd>\n              <td class=\"num\" style=\"text-align: center; color: var(--${tone}-text); font-weight: 600;\">${c.avg}%<\u002Ftd>\n              <td>${meter(c.avg, tone)}<\u002Ftd>\n            <\u002Ftr>\n          `;\n        }).join('')}\n      <\u002Ftbody>\n    <\u002Ftable>\n  `;\n}\n\n// ============================================================\n// TWEAKS\n// ============================================================\nconst VARIANT_DESC = {\n  a: 'Aplicación fiel del UI Kit Helix. Superficies suaves, badges píldora, IBM Plex Sans.',\n  b: 'Versión editorial: hero oscuro, tipografía serif para titulares, mayor escala.',\n  c: 'Operador compacto: filas densas, padding reducido para revisar muchos casos.',\n};\nconst ACCENTS = [\n  { name: 'Helix Green', hover: '#044228', pressed: '#033424', color: '#055a35' },\n  { name: 'Royal Indigo', hover: '#1e3a8a', pressed: '#1e3262', color: '#2241a1' },\n  { name: 'Slate Black', hover: '#1c211c', pressed: '#0a0d0a', color: '#2a322a' },\n  { name: 'Pacific Teal', hover: '#0e6868', pressed: '#0a4f4f', color: '#117777' },\n];\n\nlet tweakState = { ...TWEAK_DEFAULTS };\n\nfunction applyTweaks(s) {\n  document.documentElement.setAttribute('data-variant', s.variant);\n  document.documentElement.setAttribute('data-density', s.density);\n  const accent = ACCENTS.find(a => a.color.toLowerCase() === (s.accent || '').toLowerCase()) || ACCENTS[0];\n  document.documentElement.style.setProperty('--brand', accent.color);\n  document.documentElement.style.setProperty('--brand-hover', accent.hover);\n  document.documentElement.style.setProperty('--brand-pressed', accent.pressed);\n  // re-render charts to pick up new brand\n  if (!document.getElementById('view-auditor').classList.contains('hidden')) renderAuditorTrend();\n  if (!document.getElementById('view-ceo').classList.contains('hidden')) { renderCEOTrend(); renderDoctorImpact(); }\n  syncTweaksUI();\n}\nfunction syncTweaksUI() {\n  document.querySelectorAll('#tw-variant button').forEach(b => b.classList.toggle('active', b.dataset.v === tweakState.variant));\n  document.querySelectorAll('#tw-density button').forEach(b => b.classList.toggle('active', b.dataset.d === tweakState.density));\n  document.querySelectorAll('#tw-accent .tweaks-swatch').forEach(b => b.classList.toggle('active', b.dataset.color === tweakState.accent));\n  document.getElementById('tw-variant-desc').textContent = VARIANT_DESC[tweakState.variant];\n}\nfunction setTweak(partial) {\n  tweakState = { ...tweakState, ...partial };\n  applyTweaks(tweakState);\n  try { window.parent.postMessage({ type: '__edit_mode_set_keys', edits: partial }, '*'); } catch(e) {}\n}\nfunction openTweaks() { document.getElementById('tweaks-panel').classList.add('show'); }\nfunction closeTweaks() {\n  document.getElementById('tweaks-panel').classList.remove('show');\n  try { window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*'); } catch(e) {}\n}\n\n// Initialize swatches\nfunction buildAccentSwatches() {\n  document.getElementById('tw-accent').innerHTML = ACCENTS.map(a => `\n    <button class=\"tweaks-swatch\" data-color=\"${a.color}\" title=\"${a.name}\"><span style=\"background: ${a.color};\"><\u002Fspan><\u002Fbutton>\n  `).join('');\n  document.querySelectorAll('#tw-accent .tweaks-swatch').forEach(b => {\n    b.addEventListener('click', () => setTweak({ accent: b.dataset.color }));\n  });\n}\nbuildAccentSwatches();\ndocument.querySelectorAll('#tw-variant button').forEach(b => b.addEventListener('click', () => setTweak({ variant: b.dataset.v })));\ndocument.querySelectorAll('#tw-density button').forEach(b => b.addEventListener('click', () => setTweak({ density: b.dataset.d })));\n\n// Listen to host\nwindow.addEventListener('message', e => {\n  if (!e.data || typeof e.data !== 'object') return;\n  if (e.data.type === '__activate_edit_mode') openTweaks();\n  if (e.data.type === '__deactivate_edit_mode') closeTweaks();\n});\n// Announce\ntry { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch(e) {}\n\n// First render\napplyTweaks(tweakState);\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
